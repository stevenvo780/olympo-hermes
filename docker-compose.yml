services:
  # Backend API (NestJS) — conecta a pgram via VPN
  hermes-backend:
    build:
      context: ./hermes-backend
      dockerfile: Dockerfile
      target: production
    container_name: hermes-backend
    restart: unless-stopped
    env_file:
      - .env
      - ./hermes-backend/.env
    environment:
      - PORT=3000
    ports:
      - "3333:3000"
    volumes:
      - ./logs_detallados:/app/logs
    networks:
      - hermes-network
    command: ["node", "dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Panel Administrativo (Next.js)
  hermes-admin:
    build:
      context: ./hermes-admin
      dockerfile: Dockerfile
      target: development
    container_name: hermes-admin
    restart: unless-stopped
    env_file:
      - .env
      - ./hermes-admin/.env
    ports:
      - "4444:3000"
    volumes:
      - ./hermes-admin:/app
      - /app/node_modules
      - /app/.next
    networks:
      - hermes-network
    depends_on:
      - hermes-backend

  # Cliente Público (Next.js)
  hermes-client:
    build:
      context: ./hermes-client
      dockerfile: Dockerfile
      target: development
    container_name: hermes-client
    restart: unless-stopped
    env_file:
      - .env
      - ./hermes-client/.env
    ports:
      - "5555:3000"
    volumes:
      - ./hermes-client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - hermes-network
    depends_on:
      - hermes-backend

networks:
  hermes-network:
    driver: bridge
