services:
  # Backend API (NestJS) — conecta a pgram via VPN
  graf-backend:
    build:
      context: ./graf-backend
      dockerfile: Dockerfile
      target: production
    container_name: graf-backend
    restart: unless-stopped
    env_file:
      - .env
      - ./graf-backend/.env
    environment:
      - PORT=3000
    ports:
      - "3333:3000"
    volumes:
      - ./logs_detallados:/app/logs
    networks:
      - graf-network
    command: ["node", "dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Panel Administrativo (Next.js)
  graf-admin:
    build:
      context: ./graf-admin
      dockerfile: Dockerfile
      target: development
    container_name: graf-admin
    restart: unless-stopped
    env_file:
      - .env
      - ./graf-admin/.env
    ports:
      - "4444:3000"
    volumes:
      - ./graf-admin:/app
      - /app/node_modules
      - /app/.next
    networks:
      - graf-network
    depends_on:
      - graf-backend

  # Cliente Público (Next.js)
  graf-client:
    build:
      context: ./graf-client
      dockerfile: Dockerfile
      target: development
    container_name: graf-client
    restart: unless-stopped
    env_file:
      - .env
      - ./graf-client/.env
    ports:
      - "5555:3000"
    volumes:
      - ./graf-client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - graf-network
    depends_on:
      - graf-backend

networks:
  graf-network:
    driver: bridge
